version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mastermind
      POSTGRES_USER: mastermind_user
      POSTGRES_PASSWORD: mastermind_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - .env
    command: flask run --host=0.0.0.0
    environment:
      - FLASK_APP=main.py
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
